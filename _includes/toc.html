{% if page.permalink == "/" or page.permalink == "/index.html" %}
<nav id="page-toc" class="page-toc" aria-label="Page contents">
  <div class="page-toc__title">Contents</div>
  <ul class="page-toc__list">
    {% for section in site.data.toc.sections %}
    <li class="page-toc__item">
      <a href="#{{ section.id }}" class="page-toc__link">{{ section.title }}</a>
    </li>
    {% endfor %}
  </ul>
</nav>
{% endif %}
